name: Java CI with JUnit 5

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
    
  workflow_dispatch:
jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Download JUnit Console Standalone Launcher
      run: |
        curl -sL https://repo1.maven.org/maven2/org/junit/platform/junit-platform-console-standalone/1.11.0/junit-platform-console-standalone-1.11.0.jar -o DoAn/lib/junit-platform-console-standalone-1.11.0.jar

    - name: Compile Source Code and Tests
      run: |
        mkdir -p DoAn/bin
        javac -cp "DoAn/lib/*" -d DoAn/bin $(find DoAn/src -name "*.java")

    - name: Run Unit Tests
      run: |
        java -jar DoAn/lib/junit-platform-console-standalone-1.11.0.jar \
          execute \
          --class-path "DoAn/bin" \
          --select-package testcase \
          --details=tree \
          --fail-if-no-tests
